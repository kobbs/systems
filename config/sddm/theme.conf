[General]

# -- Background
# Leave empty for solid #222222. To use a wallpaper, copy it to the theme dir
# and set the filename here (e.g. BgSource="background.jpg"). The image is
# deployed to /usr/share/sddm/themes/corners/ by bootstrap.sh.
BgSource=""
FontFamily="Sans"
FontSize=12
Padding=50
Radius=12
Scale=1

# -- User picture
UserPictureEnabled=false
UserBorderWidth=3
UserBorderColor="#ff8800"
UserColor="#333333"

# -- Input fields
InputColor="#2a2a2a"
InputTextColor="#ffffff"
InputBorderWidth=2
InputBorderColor="#ff8800"
UserPlaceholderText="user"
PassPlaceholderText="password"
HidePassword=true

# -- Login button
LoginButtonTextColor="#222222"
LoginButtonText="→"
LoginButtonColor="#ff8800"

# -- Popup menus
PopupColor="#2a2a2a"
PopupActiveColor="#ff8800"
PopupActiveTextColor="#222222"

# -- Session / power buttons
SessionButtonColor="#333333"
SessionIconColor="#cccccc"
PowerButtonColor="#333333"
PowerIconColor="#ff8800"

# -- Date & time
DateTimeSpacing=16

DateColor="#888888"
DateSize=20
DateIsBold=false
DateOpacity=1.0
DateFormat="dddd d MMMM"

TimeColor="#ff8800"
TimeSize=48
TimeIsBold=true
TimeOpacity=1.0
TimeFormat="HH:mm"
