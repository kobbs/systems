set -g prefix C-a
unbind C-b
bind C-a send-prefix

set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -s escape-time 0

set -g status-style "bg=#1e1e1e,fg=#ffffff"
set -g status-left "#[fg=#88DD00,bold] #S "
set -g status-right "#[fg=#aaaaaa]%H:%M "
set -g window-status-current-style "fg=#88DD00,bold"
set -g pane-border-style "fg=#2E3436"
set -g pane-active-border-style "fg=#88DD00"

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Local overrides (per-machine customizations, not tracked by git)
source-file -q ~/.config/tmux/local.conf
