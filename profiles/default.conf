# default.conf — Base profile (checked into git).
# Override in local.conf. Missing keys inherit these defaults.

# --- System -----------------------------------------------------------
# Machine identity and base services.
[system]
hostname =
keyboard_layout =
sway_spin = auto
firewalld = true
bluetooth = true
tuned = true

# --- Packages ---------------------------------------------------------
# System-level package groups. Set to false to skip entirely.
[packages]
dnf_update = true
rpm_fusion = true
codec_swaps = true
flatpak = true
cli_tools = true
security = true
rocm = false

# --- Theme ------------------------------------------------------------
# Visual appearance. accent must match a file in colors/*.conf.
[theme]
accent = green
gtk_theme = Adwaita-dark
icon_theme = Tela
cursor_theme = Adwaita
tela_icons = true
sddm_theme = stock

# --- Shell environment ------------------------------------------------
# Env vars and aliases written to bootstrap-env.sh.
[shell]
default_shell = bash
docker_alias = true
qt_env = true
unset_ssh_askpass = true

# --- Applications -----------------------------------------------------
# User-facing apps from apps.conf.
[apps]
desktop_toolkit = qt
packs = base
firefox_wayland = true
kvm = false
protonvpn = false
